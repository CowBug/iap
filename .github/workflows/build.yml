name: Build IAPCrack.dylib

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dylib
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IAPCrack.dylib
          path: IAPCrack.dylib
